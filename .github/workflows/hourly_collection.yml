name: Hourly Weather Collection

on:
  schedule:
    # Every hour at minute 0 (UTC)
    - cron: "0 * * * *"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  collect:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    strategy:
      fail-fast: false
      matrix:
        include:
          - country_code: KR
            location_name: Seoul
            gps_json: '{"lat":37.5665,"lon":126.9780}'
          - country_code: JP
            location_name: Tokyo
            gps_json: '{"lat":35.6895,"lon":139.6917}'

    env:
      OPENWEATHER_API_KEY: ${{ secrets.OPENWEATHER_API_KEY }}
      GOOGLE_SHEET_ID: ${{ secrets.GOOGLE_SHEET_ID }}
      GOOGLE_WORKSHEET: raw_data
      GOOGLE_SERVICE_ACCOUNT_FILE: service_account.json
      ALLOWED_COUNTRIES: KR,JP
      SPLIT_WORKSHEET_BY_COUNTRY: "true"
      COLLECTION_TIMESTAMP_MODE: hour

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Write Service Account JSON
        run: |
          printf '%s' '${{ secrets.GOOGLE_SERVICE_ACCOUNT_JSON }}' > service_account.json

      - name: Collect and Append (${{ matrix.country_code }})
        run: |
          python src/ingestion/collect_weather_to_sheets.py \
            --gps-json '${{ matrix.gps_json }}' \
            --allow-countries KR,JP \
            --split-by-country \
            --location-name '${{ matrix.location_name }}'
